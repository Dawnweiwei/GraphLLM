model:
  arch: translator_optical_chatglm
  model_type: pretrain_optical
  load_finetuned: False
  pretrained: "../model_output/pretrain_optical_stage1/checkpoint_0.pth"
  llm_dir: "../models/chatglm2-6b"
  bert_dir: "../models/bert-base-uncased"
  behavior_length: 768
  freeze_behavior: True
  behavior_precision: "fp16"
  max_txt_len: 512
  num_query_token: 32
  cross_attention_freq: 2

datasets:
  optical_caption:
    type: stage2
    stage: stage2
    datasets_dir: "../../../../data/optical/gnn_embeddings/optical_train_translator_rows.tsv"
    max_text_chars: 1000
    arxiv_processor:
      train:
        name: "translator_arxiv_train"
        max_length: 512
        vocab_size: 100000
    text_processor:
      train:
        name: "translator_caption"

run:
  task: arxiv_text_pretrain
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-4
  min_lr: 1e-5
  warmup_lr: 1e-6
  weight_decay: 0.05
  max_epoch: 1
  batch_size_train: 1
  batch_size_eval: 8
  warmup_steps: 5000
  accum_grad_iters: 16
  log_freq: 50
  seed: 42
  output_dir: "../model_output/pretrain_optical_stage2"
  amp: True
  resume_ckpt_path: null
  evaluate: False
  train_splits: ["train"]
  device: "cuda:0"
  dist_url: "env://"
  distributed: True
